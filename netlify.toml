[build]
  base = "frontend"
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# API proxy → Netlify function (which proxies to Railway backend)
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200
  force  = true

# SPA fallback (React Router support)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
  
