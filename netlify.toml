[build]
  base = "frontend"
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# API proxy → Railway backend (direct external URL rewrite)
[[redirects]]
  from   = "/api/*"
  to     = "https://backend-production-1776.up.railway.app/api/:splat"
  status = 200

# SPA fallback (React Router support)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
  
