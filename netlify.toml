[build]
  base    = "frontend"
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Proxy all /api/* calls to the Railway backend (same-origin for the SPA)
[[redirects]]
  from   = "/api/*"
  to    = "https://backend-production-1776.up.railway.app"
  status = 200
  force  = true

# SPA fallback — let React Router handle all other routes
[[redirects]]
  from   = "/*"
  to    = "/index.html"
  status = 200
