# ─────────────────────────────────────────────────────────────
#  Hash Tech_AI 2026 · Netlify deployment config (frontend)
# ─────────────────────────────────────────────────────────────
#  👉 Replace the Railway URL below with your real Railway
#     backend URL once you've deployed the /backend service.
#
#  Example Railway URL:
#    https://hash-tech-ai-backend-production.up.railway.app
# ─────────────────────────────────────────────────────────────

[build]
  base    = "frontend"
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Proxy all /api/* calls to the Railway backend (same-origin for the SPA)
[[redirects]]
  from   = "/api/*"
  to    = "https://backend-production-1776.up.railway.app"
  status = 200
  force  = true

# SPA fallback — let React Router handle all other routes
[[redirects]]
  from   = "/*"
  to    = "/index.html"
  status = 200
